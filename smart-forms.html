<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智慧表單 Smart Forms - OmniAI</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 30px; }
        .feature-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fafafa; }
        h1 { color: #27ae60; }
        .back { text-decoration: none; color: #666; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← 返回首頁</a>
    <h1>📋 智慧表單 Smart Forms</h1>
    <p>本模組用於管理從對話中自動提取資訊並生成的「套印表單」。</p>

    <div class="feature-list">
        <div class="card">
            <h3>A. 檢視與檢索</h3>
            <p>透過關鍵字搜尋、模板過濾，快速定位對話紀錄所生成的表單。</p>
        </div>
        <div class="card">
            <h3>B. 編輯與異動</h3>
            <p>可針對已生成的表單進行二次編輯、刪除或匯出 PDF/Excel。</p>
        </div>
    </div>
