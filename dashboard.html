<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>系統頁面 / Dashboard - OmniAI</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 30px; color: #333; }
        .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .monitor-item { border: 1px solid #eee; padding: 15px; border-radius: 8px; border-top: 4px solid #f1c40f; }
        h1 { color: #f39c12; }
        .back { text-decoration: none; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← 返回首頁</a>
    <h1>📊 系統頁面 / Dashboard</h1>
    <p>透過視覺化介面，管理員可即時掌握整個 OmniAI 中台的運作狀態與任務進度。</p>

    <div class="monitor-grid">
        <div class="monitor-item">
            <h3>即時監測 (Real-time Monitoring)</h3>
            <p>透過動態進度環反映當前系統任務、AI 訓練進度或 API 調用負載。</p>
        </div>
        <div class="monitor-item">
            <h3>版本管理 (Version Control)</h3>
            <p>明確標示當前系統版本與技術組件狀態，確保開發與維運資訊同步。</p>
        </div>
    </div>
</body>
</html>
